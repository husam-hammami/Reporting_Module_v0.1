<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
    }
    .card {
      background: #0f1923;
      border: 1px solid #1e2d40;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    h1 {
      color: #e1e8f0;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    p {
      color: #6b7f94;
      font-size: 13px;
      margin-bottom: 28px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #1e2d40;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .close-btn {
      position: absolute; top: 12px; right: 16px;
      background: none; border: none; color: #6b7f94; font-size: 20px;
      cursor: pointer; -webkit-app-region: no-drag; line-height: 1;
      padding: 4px 8px; border-radius: 4px;
    }
    .close-btn:hover { color: #e1e8f0; background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>
  <div class="card" style="position:relative;">
    <button class="close-btn" onclick="window.close()" title="Close">&times;</button>
    <h1>Hercules Reporting Module</h1>
    <p id="status">Starting services...</p>
    <div class="spinner"></div>
    <div id="progress-bar" style="display:none; width:80%; height:4px; background:#1e2d40; border-radius:2px; margin:16px auto 0;">
      <div id="progress-fill" style="height:100%; width:0%; background:#3b82f6; border-radius:2px; transition:width 0.3s;"></div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hercules</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1825;
      color: #e1e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
      user-select: none;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #3b82f6;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 12px;
      color: #6b7f94;
      margin-bottom: 40px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #1e2d40;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .status {
      margin-top: 20px;
      font-size: 11px;
      color: #6b7f94;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">HERCULES</div>
  <div class="subtitle">Reporting Module</div>
  <div class="spinner"></div>
  <div class="status">Starting services...</div>
</body>
</html>

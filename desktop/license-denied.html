<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hercules — License Denied</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1825;
      color: #e1e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 40px;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #ef444420;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      font-size: 28px;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 12px; color: #ef4444; }
    p { font-size: 13px; color: #8898aa; line-height: 1.6; max-width: 380px; margin-bottom: 8px; }
    .contact { font-size: 12px; color: #6b7f94; margin-top: 16px; }
    button {
      margin-top: 24px;
      padding: 8px 24px;
      background: #1e2d40;
      color: #e1e8f0;
      border: 1px solid #2a3f57;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    button:hover { background: #2a3f57; }
  </style>
</head>
<body>
  <div class="icon">&#10060;</div>
  <h1>License Denied</h1>
  <p>Your license has been denied, expired, or could not be verified. Please contact the administrator for assistance.</p>
  <p class="contact">If you believe this is an error, please contact your Hercules administrator.</p>
  <button onclick="window.hercules && window.hercules.quitApp()">Close Application</button>
</body>
</html>

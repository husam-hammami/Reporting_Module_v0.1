<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hercules — License Pending</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1825;
      color: #e1e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 40px;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #f59e0b20;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      font-size: 28px;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
    p { font-size: 13px; color: #8898aa; line-height: 1.6; max-width: 380px; }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #1e2d40;
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-top: 24px;
    }
    .status {
      margin-top: 12px;
      font-size: 11px;
      color: #6b7f94;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="icon">&#9200;</div>
  <h1>Awaiting Approval</h1>
  <p>Your machine has been registered and is awaiting administrator approval. This page will automatically update once your license is approved.</p>
  <div class="spinner"></div>
  <div class="status">Checking every 30 seconds...</div>
</body>
</html>

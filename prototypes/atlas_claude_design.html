      const entry = manifest[uuid];

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.

      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

    }

    console.error('Bundle unpack error:', err);

e-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"b28de96a-8cc2-44b4-a368-c4644839b2da\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"b1feebcf-b55c-4145-ba4f-c696bfa5455c\"><\u002Fscript>\n<style>/* =====================================================\n   ATLAS · INDUSTRIAL INTELLIGENCE\n   Design system v2 — neural pulse / holographic instrument\n   ===================================================== */\n\n:root {\n  /* Base — deep navy with a warm undertone */\n  --bg-0: #04070d;\n  --bg-1: #070b14;\n  --bg-2: #0a1020;\n  --bg-3: #0e1628;\n  --bg-card: rgba(14, 22, 40, 0.55);\n  --bg-card-solid: #0c1322;\n  --bg-elev: rgba(20, 30, 52, 0.55);\n\n  /* Borders */\n  --b-1: rgba(125, 249, 255, 0.06);\n  --b-2: rgba(125, 249, 255, 0.12);\n  --b-3: rgba(125, 249, 255, 0.22);\n  --b-w-1: rgba(255, 255, 255, 0.06);\n  --b-w-2: rgba(255, 255, 255, 0.12);\n\n  /* Text */\n  --t-0: #f4f9ff;\n  --t-1: rgba(244, 249, 255, 0.86);\n  --t-2: rgba(244, 249, 255, 0.62);\n  --t-3: rgba(244, 249, 255, 0.42);\n  --t-4: rgba(244, 249, 255, 0.28);\n\n  /* Accents */\n  --cyan: #22d3ee;\n  --cyan-light: #7df9ff;\n  --cyan-dark: #0ea5e9;\n  --teal: #14b8a6;\n  --green: #10b981;\n  --green-light: #34d399;\n  --green-bright: #6ee7b7;\n  --amber: #f59e0b;\n  --amber-light: #fbbf24;\n  --orange: #f97316;\n  --red: #ef4444;\n  --red-light: #f87171;\n  --violet: #a78bfa;\n\n  /* Type */\n  --font-display: 'Geist', -apple-system, system-ui, sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', monospace;\n  --font-serif: 'Instrument Serif', Georgia, serif;\n\n  --shadow-deep: 0 20px 60px -20px rgba(0, 0, 0, 0.6);\n  --shadow-glow-cyan: 0 0 0 1px rgba(34, 211, 238, 0.18), 0 8px 32px -8px rgba(34, 211, 238, 0.25);\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\nhtml, body { height: 100%; }\n\nbody {\n  font-family: var(--font-display);\n  background: var(--bg-0);\n  color: var(--t-1);\n  font-size: 12.5px;\n  line-height: 1.5;\n  font-feature-settings: 'cv11', 'ss01', 'tnum';\n  overflow-x: hidden;\n  min-height: 100vh;\n  position: relative;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\nbutton { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }\ninput { font: inherit; color: inherit; background: none; border: none; outline: none; }\n.mono { font-family: var(--font-mono); font-feature-settings: 'tnum', 'zero'; letter-spacing: -0.01em; }\n.muted { color: var(--t-3); }\n.hl { color: var(--cyan-light); font-weight: 700; }\n.hl-cyan { color: var(--cyan-light); font-weight: 700; }\n.hl-amber { color: var(--amber); font-weight: 600; }\n.amber { color: var(--amber); }\n.cyan { color: var(--cyan-light); }\n.green { color: var(--green-light); }\n.red { color: var(--red-light); }\n.ok { color: var(--green-light); }\n.warn { color: var(--amber); }\n\n/* ============ AMBIENT ============ */\n.ambient {\n  position: fixed; inset: 0;\n  pointer-events: none;\n  z-index: 0;\n}\n.ambient-grid {\n  position: absolute; inset: 0;\n  background-image:\n    linear-gradient(rgba(125, 249, 255, 0.025) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(125, 249, 255, 0.025) 1px, transparent 1px);\n  background-size: 56px 56px;\n  mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 30%, transparent 80%);\n  -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 30%, transparent 80%);\n}\n.ambient-noise {\n  position: absolute; inset: 0;\n  opacity: 0.025;\n  background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E\");\n}\n.ambient-aurora {\n  position: absolute;\n  border-radius: 50%;\n  filter: blur(80px);\n  opacity: 0.5;\n}\n.ambient-aurora.a1 {\n  width: 60vw; height: 60vw;\n  top: -20vw; left: 20vw;\n  background: radial-gradient(circle, rgba(34, 211, 238, 0.18), transparent 60%);\n  animation: drift1 28s ease-in-out infinite;\n}\n.ambient-aurora.a2 {\n  width: 50vw; height: 50vw;\n  bottom: -10vw; right: -5vw;\n  background: radial-gradient(circle, rgba(245, 158, 11, 0.06), transparent 60%);\n  animation: drift2 36s ease-in-out infinite;\n}\n@keyframes drift1 {\n  0%, 100% { transform: translate(0, 0); }\n  50% { transform: translate(-3vw, 4vw); }\n}\n@keyframes drift2 {\n  0%, 100% { transform: translate(0, 0); }\n  50% { transform: translate(3vw, -3vw); }\n}\n.ambient-scanline {\n  position: absolute;\n  left: 0; right: 0; top: 0; height: 1px;\n  background: linear-gradient(90deg, transparent, var(--cyan-light) 50%, transparent);\n  opacity: 0.3;\n  animation: scanline 9s linear infinite;\n}\n@keyframes scanline {\n  0% { transform: translateY(0vh); opacity: 0; }\n  10% { opacity: 0.6; }\n  90% { opacity: 0.6; }\n  100% { transform: translateY(100vh); opacity: 0; }\n}\n\n/* ============ APP LAYOUT ============ */\n.app {\n  display: grid;\n  grid-template-columns: 244px 1fr;\n  min-height: 100vh;\n  position: relative;\n  z-index: 1;\n}\n\n/* ============ SIDEBAR ============ */\n.sidebar {\n  background: linear-gradient(180deg, rgba(7, 11, 20, 0.94), rgba(4, 7, 13, 0.96));\n  border-right: 1px solid var(--b-1);\n  backdrop-filter: blur(12px);\n  display: flex;\n  flex-direction: column;\n  padding: 20px 16px 16px;\n  position: sticky;\n  top: 0;\n  height: 100vh;\n  overflow-y: auto;\n  scrollbar-width: thin;\n}\n\n.brand {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  padding: 0 6px 14px;\n}\n.brand-mark {\n  width: 38px; height: 38px;\n  flex-shrink: 0;\n  filter: drop-shadow(0 0 12px rgba(34, 211, 238, 0.4));\n  position: relative;\n}\n.brand-mark svg { width: 100%; height: 100%; }\n.brand-text { line-height: 1.15; }\n.brand-title {\n  font-size: 14px;\n  font-weight: 700;\n  color: #fff;\n  letter-spacing: 0.04em;\n  font-family: var(--font-mono);\n}\n.brand-dot { color: var(--cyan-light); margin-left: 1px; }\n.brand-subtitle {\n  font-size: 9.5px;\n  color: var(--t-3);\n  margin-top: 2px;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n}\n.brand-divider {\n  height: 1px;\n  background: linear-gradient(90deg, transparent, var(--b-2), transparent);\n  margin-bottom: 14px;\n}\n\n.ai-pulse-card {\n  background: linear-gradient(180deg, rgba(34, 211, 238, 0.05), rgba(34, 211, 238, 0.01));\n  border: 1px solid var(--b-2);\n  border-radius: 10px;\n  padding: 11px 12px;\n  margin-bottom: 18px;\n  position: relative;\n  overflow: hidden;\n}\n.ai-pulse-card::before {\n  content: '';\n  position: absolute;\n  top: 0; left: 0; right: 0;\n  height: 1px;\n  background: linear-gradient(90deg, transparent, var(--cyan-light), transparent);\n  opacity: 0.5;\n}\n.ai-pulse-head {\n  display: flex; align-items: center; gap: 7px;\n  margin-bottom: 8px;\n}\n.ai-pulse-dot {\n  width: 7px; height: 7px;\n  border-radius: 50%;\n  background: var(--green-light);\n  box-shadow: 0 0 6px var(--green-light), 0 0 12px rgba(52, 211, 153, 0.5);\n  animation: pulse-glow 1.6s ease-in-out infinite;\n}\n@keyframes pulse-glow {\n  0%, 100% { opacity: 1; transform: scale(1); }\n  50% { opacity: 0.7; transform: scale(0.85); }\n}\n.ai-pulse-label {\n  font-size: 11px;\n  font-weight: 600;\n  color: var(--t-1);\n  letter-spacing: 0.02em;\n}\n.ai-pulse-ver {\n  margin-left: auto;\n  font-family: var(--font-mono);\n  font-size: 9px;\n  color: var(--t-3);\n}\n.ai-pulse-meta {\n  display: flex;\n  flex-direction: column;\n  gap: 3px;\n  margin-bottom: 8px;\n}\n.ai-pulse-row {\n  display: flex; justify-content: space-between;\n  font-size: 10px;\n  color: var(--t-3);\n}\n.ai-pulse-row .mono { color: var(--cyan-light); }\n.ai-pulse-wave {\n  height: 22px;\n  margin: 0 -2px;\n  opacity: 0.85;\n}\n.ai-pulse-wave svg { width: 100%; height: 100%; }\n#pulseWave { animation: pulseShift 4s linear infinite; }\n@keyframes pulseShift {\n  0%, 100% { transform: translateX(0); }\n  50% { transform: translateX(-4px); }\n}\n\n/* nav */\n.nav { display: flex; flex-direction: column; gap: 1px; flex: 1; }\n.nav-section-label {\n  font-size: 9px;\n  color: var(--t-4);\n  text-transform: uppercase;\n  letter-spacing: 0.14em;\n  margin: 4px 8px 8px;\n  font-family: var(--font-mono);\n}\n.nav-item {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 8px 10px;\n  border-radius: 7px;\n  color: var(--t-2);\n  cursor: pointer;\n  font-size: 12.5px;\n  font-weight: 500;\n  transition: all 0.15s;\n  position: relative;\n}\n.nav-item:hover { color: var(--t-0); background: rgba(125, 249, 255, 0.04); }\n.nav-item.active {\n  color: var(--cyan-light);\n  background: linear-gradient(90deg, rgba(34, 211, 238, 0.1), rgba(34, 211, 238, 0.01));\n}\n.nav-item.active::before {\n  content: '';\n  position: absolute; left: -1px; top: 6px; bottom: 6px; width: 2px;\n  background: var(--cyan-light);\n  box-shadow: 0 0 8px var(--cyan-light), 0 0 14px rgba(125, 249, 255, 0.6);\n  border-radius: 2px;\n}\n.nav-icon {\n  width: 16px; height: 16px;\n  display: inline-flex;\n  align-items: center; justify-content: center;\n  flex-shrink: 0;\n  opacity: 0.85;\n}\n.nav-count {\n  margin-left: auto;\n  font-family: var(--font-mono);\n  font-size: 9.5px;\n  font-weight: 600;\n  padding: 2px 6px;\n  border-radius: 10px;\n  background: var(--b-w-1);\n  color: var(--t-2);\n}\n.nav-count.amber {\n  background: rgba(245, 158, 11, 0.12);\n  color: var(--amber);\n}\n\n/* sidebar footer */\n.sidebar-footer {\n  border-top: 1px solid var(--b-1);\n  padding-top: 14px;\n  margin-top: 12px;\n}\n.sys-status { margin-bottom: 12px; }\n.sys-status-row {\n  display: flex; align-items: center; gap: 8px;\n  font-size: 11px; color: var(--t-1);\n  font-weight: 500;\n  margin-bottom: 5px;\n}\n.sys-dot {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: var(--green-light);\n  box-shadow: 0 0 6px var(--green-light);\n  animation: pulse-glow 1.6s ease-in-out infinite;\n}\n.sys-meta {\n  display: flex; gap: 5px;\n  font-size: 9.5px; color: var(--t-3);\n  margin-left: 14px;\n  font-family: var(--font-mono);\n}\n.user-chip {\n  display: flex;\n  align-items: center;\n  gap: 9px;\n  padding: 7px 8px;\n  border: 1px solid var(--b-1);\n  border-radius: 9px;\n  cursor: pointer;\n  transition: border-color 0.15s, background 0.15s;\n}\n.user-chip:hover { border-color: var(--b-2); background: rgba(125, 249, 255, 0.02); }\n.user-avatar {\n  width: 28px; height: 28px;\n  border-radius: 50%;\n  background: linear-gradient(135deg, var(--cyan), var(--teal));\n  color: #fff;\n  font-size: 10.5px;\n  font-weight: 700;\n  display: inline-flex; align-items: center; justify-content: center;\n  flex-shrink: 0;\n  box-shadow: 0 0 0 1.5px rgba(34, 211, 238, 0.3), inset 0 -1px 2px rgba(0, 0, 0, 0.3);\n}\n.user-info { flex: 1; min-width: 0; }\n.user-name {\n  font-size: 11px; font-weight: 600; color: var(--t-1);\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n}\n.user-role {\n  font-size: 9px; color: var(--t-3);\n  text-transform: uppercase;\n  letter-spacing: 0.05em;\n}\n.user-chip svg { color: var(--t-3); }\n\n/* ============ MAIN ============ */\n.main {\n  display: flex; flex-direction: column;\n  min-width: 0;\n  position: relative;\n}\n\n/* ============ TOP BAR ============ */\n.topbar {\n  height: 50px;\n  display: grid;\n  grid-template-columns: 1fr auto 1fr;\n  align-items: center;\n  padding: 0 22px;\n  border-bottom: 1px s: 999px;\n  background: rgba(125, 249, 255, 0.06);\n  border: 1px solid var(--b-2);\n  font-size: 10.5px;\n  font-weight: 600;\n  color: var(--cyan-light);\n  letter-spacing: 0.04em;\n  transition: all 0.15s;\n}\n.ns-cta:hover { background: rgba(125, 249, 255, 0.1); border-color: var(--b-3); }\n.ns-cta-key {\n  font-size: 10px;\n  padding: 1px 5px;\n  border-radius: 4px;\n  background: rgba(125, 249, 255, 0.08);\n  color: var(--cyan-light);\n}\n\n/* ============ CONTENT ============ */\n.content {\n  padding: 16px 22px 160px;\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n  flex: 1;\n  position: relative;\n}\n\n.tab-pane { display: none; flex-direction: column; gap: 14px; }\n.tab-pane.active {\n  display: flex;\n  animation: paneIn 0.42s cubic-bezier(0.2, 0.8, 0.3, 1.05);\n}\n@keyframes paneIn {\n  from { opacity: 0; transform: translateY(6px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n\n.row {\n  display: grid;\n  gap: 14px;\n}\n.row-prod-hero { grid-template-columns: 1.4fr 1.2fr 0.95fr; }\n.row-prod-strip { grid-template-columns: repeat(6, 1fr); gap: 11px; }\n.row-prod-bottom { grid-template-columns: 1fr 1.15fr 1fr; }\n\n.row-pdm-1 { grid-template-columns: 1fr 1fr 1fr; }\n.row-pdm-2 { grid-template-columns: 1.45fr 0.85fr 1.1fr; }\n.row-pdm-3 { grid-template-columns: 1fr 1.05fr 1fr; }\n\n.row-yield-1 { grid-template-columns: 1fr 1fr 1fr; }\n.row-yield-3 { grid-template-columns: 1fr 1fr 1fr; }\n.row-yield-4 { grid-template-columns: 0.95fr 1.55fr; }\n\n/* ============ CARD ============ */\n.card {\n  background: var(--bg-card);\n  border: 1px solid var(--b-w-1);\n  border-radius: 14px;\n  padding: 14px 16px;\n  position: relative;\n  backdrop-filter: blur(12px);\n  transition: border-color 0.2s, transform 0.2s;\n  overflow: hidden;\n}\n.card::before {\n  content: '';\n  position: absolute;\n  top: 0; left: 12px; right: 12px;\n  height: 1px;\n  background: linear-gradient(90deg, transparent, var(--b-2), transparent);\n  opacity: 0.6;\n  pointer-events: none;\n}\n.card:hover { border-color: var(--b-2); }\n\n/* eyebrow */\n.card-eyebrow {\n  display: inline-flex; align-items: center; gap: 7px;\n  font-size: 9.5px;\n  font-weight: 600;\n  color: var(--t-3);\n  text-transform: uppercase;\n  letter-spacing: 0.12em;\n  font-family: var(--font-mono);\n  margin-bottom: 10px;\n}\n.card-eyebrow.amber { color: var(--amber); }\n.card-eyebrow.cyan { color: var(--cyan-light); }\n.card-eyebrow.green { color: var(--green-light); }\n.ce-dot {\n  width: 5px; height: 5px;\n  border-radius: 50%;\n  background: var(--cyan-light);\n  box-shadow: 0 0 4px currentColor;\n}\n.ce-dot.ok { background: var(--green-light); color: var(--green-light); }\n.ce-dot.warn { background: var(--amber); color: var(--amber); }\n.ce-dot.info { background: var(--cyan-light); color: var(--cyan-light); }\n\n/* ============ STATUS PILL ============ */\n.status-pill {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 3px 9px;\n  border-radius: 999px;\n  font-size: 9.5px;\n  font-weight: 700;\n  letter-spacing: 0.08em;\n  font-family: var(--font-mono);\n  white-space: nowrap;\n}\n.status-pill.lg { padding: 4px 11px; font-size: 10px; }\n.status-pill .dot {\n  width: 6px; height: 6px;\n  border-radius: 50%;\n  background: currentColor;\n  box-shadow: 0 0 5px currentColor;\n}\n.status-pill.ok {\n  background: rgba(16, 185, 129, 0.1);\n  border: 1px solid rgba(16, 185, 129, 0.32);\n  color: var(--green-light);\n}\n.status-pill.ok .dot { animation: pulse-glow 1.6s ease-in-out infinite; }\n.status-pill.warn {\n  background: rgba(245, 158, 11, 0.1);\n  border: 1px solid rgba(245, 158, 11, 0.32);\n  color: var(--amber);\n}\n.status-pill.warn .dot { animation: pulse-glow 1.4s ease-in-out infinite; }\n.status-pill.cyan {\n  background: rgba(34, 211, 238, 0.08);\n  border: 1px solid rgba(34, 211, 238, 0.32);\n  color: var(--cyan-light);\n}\n.status-pill.cyan .dot { animation: pulse-glow 1.5s ease-in-out infinite; }\n.status-pill.mixed {\n  background: linear-gradient(90deg, rgba(16, 185, 129, 0.1), rgba(245, 158, 11, 0.1));\n  border: 1px solid rgba(245, 158, 11, 0.3);\n  color: var(--amber-light);\n}\n.status-pill.mixed .dot {\n  background: linear-gradient(45deg, var(--green-light), var(--amber));\n}\n\n/* ============ HERO CARD (Production) ============ */\n.hero-card {\n  position: relative;\n  display: flex;\n  flex-direction: column;\n  padding: 18px 20px;\n  min-height: 280px;\n  overflow: hidden;\n}\n.hero-bg-orb {\n  position: absolute;\n  width: 360px; height: 360px;\n  border-radius: 50%;\n  top: -120px; right: -100px;\n  background: radial-gradient(circle, rgba(16, 185, 129, 0.12) 0%, transparent 60%);\n  filter: blur(40px);\n  pointer-events: none;\n}\n.hero-status {\n  display: flex; align-items: center; gap: 10px;\n  margin-bottom: 14px;\n}\n.hero-conf {\n  font-size: 10px;\n  color: var(--t-3);\n  letter-spacing: 0.04em;\n}\n.hero-title {\n  font-family: var(--font-display);\n  font-size: 22px;\n  font-weight: 600;\n  color: var(--t-0);\n  letter-spacing: -0.02em;\n  line-height: 1.2;\n  text-wrap: pretty;\n  margin-bottom: 6px;\n}\n.hero-title .hl {\n  background: linear-gradient(135deg, var(--green-light), var(--cyan-light));\n  -webkit-background-clip: text;\n  background-clip: text;\n  -webkit-text-fill-color: transparent;\n  font-weight: 700;\n}\n.hero-sub {\n  font-size: 12px;\n  color: var(--t-2);\n  margin-bottom: 18px;\n}\n\n.hero-rings {\n  display: flex;\n  align-items: center;\n  gap: 14px;\n  margin-bottom: 14px;\n  flex: 1;\n  justify-content: center;\n}\n.hero-ring-block {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 8px;\n}\n.hero-ring {\n  width: 110px; height: 110px;\n  position: relative;\n}\n.hero-ring svg { width: 100%; height: 100%; }\n.ring-num-svg {\n  font-family: var(--font-mono);\n  font-size: 18px;\n  font-weight: 700;\n  fill: var(--t-0);\n  letter-spacing: -0.02em;\n}\n.ring-num-svg.amber-num { fill: var(--amber); }\n.ring-unit- ;\n  line-height: 1.5;\n  margin-bottom: 8px;\n}\n.rp-suggestion b { color: var(--cyan-light); }\n.rp-rationale {\n  font-size: 10.5px;\n  color: var(--t-3);\n  line-height: 1.5;\n  margin-bottom: 12px;\n}\n.rp-rationale b { color: var(--t-1); }\n.rp-action {\n  margin-top: auto;\n  align-self: flex-start;\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 7px 12px 7px 14px;\n  border-radius: 999px;\n  background: linear-gradient(135deg, var(--cyan-light), var(--cyan-dark));\n  color: var(--bg-0);\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.04em;\n  box-shadow: 0 4px 14px rgba(34, 211, 238, 0.3), 0 0 0 1px rgba(125, 249, 255, 0.4);\n  transition: transform 0.15s, box-shadow 0.15s;\n}\n.rp-action:hover {\n  transform: translateY(-1px);\n  box-shadow: 0 6px 18px rgba(34, 211, 238, 0.45), 0 0 0 1px rgba(125, 249, 255, 0.6);\n}\n.rp-good {\n  font-size: 9.5px;\n  font-weight: 700;\n  color: var(--green-light);\n  letter-spacing: 0.12em;\n  margin-top: 10px;\n  padding-top: 10px;\n  border-top: 1px dashed var(--b-w-1);\n}\n\n/* ============ PERF CARD ============ */\n.perf-card { display: flex; flex-direction: column; min-height: 240px; padding: 14px 16px; }\n.perf-bars {\n  flex: 1;\n  display: flex;\n  align-items: flex-end;\n  justify-content: space-around;\n  gap: 14px;\n  padding: 24px 6px 8px;\n  border-bottom: 1px solid var(--b-w-1);\n  margin-bottom: 8px;\n}\n.perf-col {\n  flex: 1;\n  display: flex; flex-direction: column;\n  align-items: center;\n  height: 100%;\n  justify-content: flex-end;\n}\n.perf-num {\n  font-size: 14px;\n  font-weight: 700;\n  letter-spacing: -0.02em;\n  margin-bottom: 8px;\n  display: flex; align-items: baseline;\n}\n.perf-num.cyan { color: var(--cyan-light); }\n.perf-num.green { color: var(--green-light); }\n.perf-num.green-bright {\n  color: var(--green-bright);\n  text-shadow: 0 0 12px rgba(52, 211, 153, 0.5);\n}\n.pnu {\n  font-size: 10px;\n  color: var(--t-3);\n  font-weight: 500;\n  margin-left: 1px;\n}\n.perf-bar {\n  width: 42px;\n  height: var(--h);\n  border-radius: 5px 5px 1px 1px;\n  box-shadow: inset 0 -3px 6px rgba(0, 0, 0, 0.2);\n}\n.perf-bar.cyan {\n  background: linear-gradient(180deg, var(--cyan-light) 0%, var(--cyan-dark) 100%);\n  box-shadow: 0 0 14px rgba(34, 211, 238, 0.35), inset 0 -3px 6px rgba(0, 0, 0, 0.2);\n}\n.perf-bar.green {\n  background: linear-gradient(180deg, var(--green-light) 0%, var(--green) 100%);\n  box-shadow: 0 0 14px rgba(16, 185, 129, 0.4), inset 0 -3px 6px rgba(0, 0, 0, 0.2);\n}\n.perf-bar.green-bright {\n  background: linear-gradient(180deg, var(--green-bright) 0%, var(--green-light) 50%, var(--green) 100%);\n  box-shadow: 0 0 22px rgba(16, 185, 129, 0.6), 0 0 36px rgba(16, 185, 129, 0.25), inset 0 -3px 6px rgba(0, 0, 0, 0.2);\n}\n.perf-label {\n  font-size: 10px;\n  font-weight: 600;\n  color: var(--t-2);\n  margin-top: 7px;\n  text-align: center;\n}\n.perf-foot {\n  font-size: 11px;\n  color: var(--t-2);\n  line-height: 1.4;\n}\n.perf-foot b.ok { color: var(--green-light); font-weight: 700; }\n\n/* ============ OPP CARD + RECS ============ */\n.right-col {\n  display: grid;\n  grid-template-rows: auto 1fr;\n  gap: 14px;\n  min-width: 0;\n}\n.opp-card {\n  display: flex; align-items: center; gap: 18px;\n  position: relative;\n  padding: 16px 18px;\n  background: linear-gradient(135deg, rgba(16, 185, 129, 0.06), rgba(34, 211, 238, 0.03));\n  overflow: hidden;\n}\n.opp-glow {\n  position: absolute;\n  width: 200px; height: 200px;\n  border-radius: 50%;\n  top: -80px; right: -50px;\n  background: radial-gradient(circle, rgba(16, 185, 129, 0.18), transparent 60%);\n  filter: blur(30px);\n  pointer-events: none;\n}\n.opp-num { flex-shrink: 0; }\n.opp-big {\n  font-size: 38px;\n  font-weight: 700;\n  color: var(--green-light);\n  letter-spacing: -0.04em;\n  line-height: 1;\n  text-shadow: 0 0 18px rgba(52, 211, 153, 0.35);\n  display: flex; align-items: baseline;\n}\n.oppu { font-size: 14px; color: var(--t-3); font-weight: 500; }\n.opp-cap {\n  font-size: 8.5px;\n  color: var(--t-3);\n  letter-spacing: 0.12em;\n  margin-top: 6px;\n}\n.opp-text { flex: 1; min-width: 0; position: relative; z-index: 1; }\n.opp-title {\n  font-size: 13px;\n  font-weight: 600;\n  color: var(--t-0);\n  margin-bottom: 4px;\n}\n.opp-savings {\n  display: flex; align-items: baseline; gap: 8px;\n  margin-top: 6px;\n}\n.os-amount {\n  font-size: 18px;\n  font-weight: 700;\n  color: var(--amber);\n  letter-spacing: -0.02em;\n}\n.osu {\n  font-size: 11px;\n  color: var(--t-3);\n  font-weight: 500;\n}\n.os-label {\n  font-size: 10px;\n  color: var(--t-2);\n}\n.opp-cumulative {\n  font-size: 10px;\n  color: var(--t-3);\n  margin-top: 4px;\n  letter-spacing: 0.04em;\n}\n\n.recs-block {\n  background: var(--bg-card);\n  border: 1px solid var(--b-w-1);\n  border-radius: 14px;\n  padding: 14px 16px;\n}\n.rec-list {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 10px;\n}\n.rec-card {\n  padding: 12px 13px;\n  background: rgba(255, 255, 255, 0.02);\n  border: 1px solid var(--b-w-1);\n  border-radius: 10px;\n  display: flex; flex-direction: column;\n  gap: 6px;\n  transition: border-color 0.18s;\n}\n.rec-card:hover { border-color: var(--b-2); }\n.rec-head {\n  display: flex; align-items: center; justify-content: space-between;\n  gap: 6px;\n}\n.rec-num {\n  width: 24px; height: 24px;\n  border-radius: 50%;\n  background: rgba(34, 211, 238, 0.1);\n  border: 1px solid rgba(34, 211, 238, 0.3);\n  color: var(--cyan-light);\n  font-size: 10px;\n  font-weight: 700;\n  display: inline-flex; align-items: center; justify-content: center;\n  letter-spacing: 0.04em;\n}\n.rec-impact {\n  font-size: 8.5px;\n  font-weight: 700;\n  padding: 2px 7px;\n  border-radius: 999px;\n  letter-spacing: 0.08em;\n  font-family: var(--font-mono);\n}\n.rec-impact.high {\n  color: var(--green-light);\n  background: rgba(16, 185, 129, 0.1);\n  border: 1px solid rgba(16, 185, 129, 0.32);\n}\n.rec-impact.med {\n  color: var(--amber);\n  background: rgba(245, 158, 11, 0.08);\n  border: 1px solid rgba(245, 158, 11, 0.28);\n}\n.rec-title {\n  font-size: 12px;\n  font-weight: 600;\n  color: var(--t-0);\n  line-height: 1.3;\n}\n.rec-desc {\n  font-size: 10px;\n  color: var(--t-3);\n  line-height: 1.5;\n}\n\n/* ============ ASK ATLAS COMPOSER ============ */\n.ask-atlas {\n  position: fixed;\n  left: 260px;\n  right: 22px;\n  bottom: 16px;\n  z-index: 20;\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  gap: 16px;\n  align-items: center;\n  padding: 12px 18px;\n  background: linear-gradient(180deg, rgba(10, 16, 32, 0.85), rgba(7, 11, 20, 0.95));\n  border: 1px solid var(--b-2);\n  border-radius: 16px;\n  backdrop-filter: blur(20px);\n  box-shadow: 0 -2px 24px rgba(34, 211, 238, 0.12), 0 12px 40px -10px rgba(0, 0, 0, 0.6);\n}\n.ask-atlas::before {\n  content: '';\n  position: absolute;\n  top: 0; left: 24px; right: 24px;\n  height: 1px;\n  background: linear-gradient(90deg, transparent, var(--cyan-light), transparent);\n  opacity: 0.55;\n}\n\n.aa-orb {\n  width: 42px; height: 42px;\n  flex-shrink: 0;\n  position: relative;\n  display: flex; align-items: center; justify-content: center;\n}\n.aa-orb-inner {\n  width: 100%; height: 100%;\n  border-radius: 50%;\n  background: radial-gradient(circle, rgba(34, 211, 238, 0.4) 0%, rgba(14, 165, 233, 0.15) 50%, transparent 70%);\n  border: 1.5px solid rgba(125, 249, 255, 0.5);\n  display: flex; align-items: center; justify-content: center;\n  position: relative;\n  box-shadow: 0 0 16px rgba(34, 211, 238, 0.4), inset 0 0 12px rgba(34, 211, 238, 0.25);\n  animation: orb-glow 2.6s ease-in-out infinite;\n}\n.aa-orb-core {\n  width: 14px; height: 14px;\n  border-radius: 50%;\n  background: linear-gradient(135deg, var(--cyan-light), var(--cyan));\n  box-shadow: 0 0 8px var(--cyan-light), 0 0 16px rgba(125, 249, 255, 0.5);\n  animation: orb-pulse 2.6s ease-in-out infinite;\n}\n@keyframes orb-glow {\n  0%, 100% { box-shadow: 0 0 16px rgba(34, 211, 238, 0.4), inset 0 0 12px rgba(34, 211, 238, 0.25); }\n  50% { box-shadow: 0 0 24px rgba(34, 211, 238, 0.65), inset 0 0 16px rgba(34, 211, 238, 0.4); }\n}\n@keyframes orb-pulse {\n  0%, 100% { transform: scale(1); }\n  50% { transform: scale(1.18); }\n}\n\n.aa-content {\n  display: flex; flex-direction: column;\n  gap: 6px;\n  min-width: 0;\n}\n.aa-eyebrow {\n  display: flex; align-items: center; gap: 6px;\n  font-size: 9px;\n  color: var(--cyan-light);\n  letter-spacing: 0.16em;\n  font-weight: 600;\n}\n.aa-dot {\n  width: 5px; height: 5px;\n  border-radius: 50%;\n  background: var(--cyan-light);\n  box-shadow: 0 0 5px var(--cyan-light);\n  animation: pulse-glow 1.6s ease-in-out infinite;\n}\n.aa-sep { color: var(--t-4); }\n.aa-context { color: var(--t-2); letter-spacing: 0.04em; font-weight: 500; }\n\n.aa-input-wrap {\n  display: flex; align-items: center; gap: 8px;\n  background: rgba(255, 255, 255, 0.03);\n  border: 1px solid var(--b-2);\n  border-radius: 999px;\n  padding: 6px 6px 6px 16px;\n  transition: border-color 0.15s, box-shadow 0.15s;\n}\n.aa-input-wrap:focus-within {\n  border-color: rgba(125, 249, 255, 0.55);\n  box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1);\n}\n.aa-input {\n  flex: 1;\n  font-size: 12.5px;\n  color: var(--t-1);\n}\n.aa-input::placeholder { color: var(--t-3); }\n.aa-send {\n  width: 30px; height: 30px;\n  border-radius: 50%;\n  background: linear-gradient(135deg, var(--cyan-light), var(--cyan-dark));\n  color: #051018;\n  display: inline-flex; align-items: center; justify-content: center;\n  flex-shrink: 0;\n  box-shadow: 0 2px 12px rgba(34, 211, 238, 0.45);\n  transition: transform 0.12s;\n}\n.aa-send:hover { transform: scale(1.06); }\n\n.aa-chips {\n  display: flex; gap: 6px; flex-wrap: wrap;\n}\n.aa-chip {\n  padding: 4px 10px;\n  border-radius: 999px;\n  background: rgba(255, 255, 255, 0.03);\n  border: 1px solid var(--b-w-1);\n  font-size: 10.5px;\n  color: var(--t-2);\n  white-space: nowrap;\n  transition: all 0.15s;\n}\n.aa-chip:hover {\n  color: var(--cyan-light);\n  border-color: var(--b-2);\n  background: rgba(125, 249, 255, 0.04);\n}\n\n.aa-meta {\n  display: flex; flex-direction: column;\n  gap: 2px;\n  align-items: flex-end;\n  flex-shrink: 0;\n}\n.aa-meta-row {\n  display: flex; gap: 8px;\n  font-size: 9px;\n  color: var(--t-3);\n  letter-spacing: 0.06em;\n}\n.aa-meta-row span:last-child { color: var(--cyan-light); font-weight: 600; }\n\n/* ============ RESPONSIVE ============ */\n@media (max-width: 1380px) {\n  .topbar { grid-template-columns: auto 1fr auto; gap: 12px; }\n  .breadcrumb .crumb:not(.active) { display: none; }\n  .breadcrumb .crumb-sep { display: none; }\n  .top-tab { padding: 6px 11px; font-size: 11px; }\n  .top-tab svg { display: none; }\n  .search-pill span { display: none; }\n  .search-pill kbd { display: none; }\n}\n@media (max-width: 1320px) {\n  .row-prod-hero { grid-template-columns: 1fr 1fr; }\n  .row-prod-hero .target-card { grid-column: span 2; }\n  .row-prod-bottom { grid-template-columns: 1fr 1fr; }\n  .row-prod-bottom .enabler-card { grid-column: span 2; }\n  .row-pdm-2 { grid-template-columns: 1fr 1fr; }\n  .row-pdm-2 .stack-col { grid-column: span 2; flex-direction: row; }\n  .row-pdm-2 .stack-col > .card { flex: 1; }\n  .row-yield-1 { grid-template-columns: 1fr; }\n  .row-yield-3 { grid-template-columns: 1fr; }\n  .row-yield-4 { grid-template-columns: 1fr; }\n  .row-prod-strip { grid-template-columns: repeat(3, 1fr); }\n}\n@media (max-width: 900px) {\n  .app { grid-template-columns: 1fr; }\n  .sidebar { display: none; }\n  .ask-atlas { left: 16px; right: 16px; }\n  .row-prod-hero, .row-prod-hero .target-card { grid-template-columns: 1fr; grid-column: auto; }\n  .row-pdm-1, .row-pdm-3 { grid-template-columns: 1fr; }\n}\n\n/* ============================================================\n   YIELD TAB — redesigned hero + diagnosis layout\n   ============================================================ */\n\n/* ---- ROW 1: hero (3D mill + side rail) ---- */\n.yield-hero {\n  display: grid;\n  grid-template-columns: minmax(0, 1fr) 320px;\n  gap: 16px;\n  margin-bottom: 16px;\n}\n@media (max-width: 1180px) {\n  .yield-hero { grid-template-columns: 1fr; }\n}\n\n/* ---- Mill card (the 3D scene container) ---- */\n.mill-card {\n  display: flex;\n  flex-direction: column;\n  padding: 0;\n  overflow: hidden;\n}\n.mill-header {\n  padding: 18px 22px 14px;\n  border-bottom: 1px solid var(--border);\n  background: linear-gradient(180deg, rgba(125,249,255,0.025), transparent);\n}\n.mill-eyebrow {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  font-size: 10.5px;\n  letter-spacing: 0.08em;\n  color: var(--fg-3);\n  margin-bottom: 10px;\n}\n.mill-eyebrow .me-dot {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: #34d399;\n  box-shadow: 0 0 0 3px rgba(52,211,153,0.18);\n  animation: me-pulse 2s ease-in-out infinite;\n}\n@keyframes me-pulse {\n  0%, 100% { box-shadow: 0 0 0 3px rgba(52,211,153,0.18); }\n  50%      { box-shadow: 0 0 0 5px rgba(52,211,153,0.05); }\n}\n.mill-eyebrow .me-text { color: #34d399; }\n.mill-eyebrow .me-sep  { color: var(--fg-4); }\n.mill-eyebrow .me-meta { color: var(--fg-3); }\n\n.mill-title {\n  font-size: 22px;\n  font-weight: 500;\n  letter-spacing: -0.012em;\n  line-height: 1.18;\n  color: var(--fg-1);\n  margin: 0 0 8px;\n}\n.mill-title em {\n  font-style: normal;\n  color: #7df9ff;\n  background: linear-gradient(180deg, transparent 60%, rgba(125,249,255,0.16) 60%);\n  padding: 0 2px;\n}\n.mill-sub {\n  margin: 0;\n  font-size: 13px;\n  line-height: 1.55;\n  color: var(--fg-2);\n  max-width: 78ch;\n}\n.mill-sub b { color: var(--fg-1); font-weight: 500; }\n.mill-sub .hl-cyan  { color: #7df9ff; }\n.mill-sub .hl-amber { color: #f59e0b; }\n\n/* ---- Mill 3D stage ---- */\n.mill-stage {\n  position: relative;\n  width: 100%;\n  height: 480px;\n  background:\n    radial-gradient(ellipse at 50% 40%, rgba(125,249,255,0.06), transparent 65%),\n    radial-gradient(ellipse at 50% 100%, rgba(245,158,11,0.04), transparent 60%),\n    linear-gradient(180deg, #0a0f18 0%, #060a12 100%);\n  overflow: hidden;\n}\n.mill-stage > #milling-canvas {\n  position: absolute;\n  inset: 0;\n  width: 100% !important;\n  height: 100% !important;\n  display: block;\n}\n.mill-leaders {\n  position: absolute;\n  inset: 0;\n  width: 100%;\n  height: 100%;\n  pointer-events: none;\n}\n\n/* ---- Annotation pills layered over the canvas ---- */\n.mill-annots {\n  position: absolute;\n  inset: 0;\n  pointer-events: none;\n}\n.mann {\n  position: absolute;\n  pointer-events: auto;\n  background: rgba(10, 16, 26, 0.78);\n  backdrop-filter: blur(8px);\n  -webkit-backdrop-filter: blur(8px);\n  border: 1px solid rgba(125,249,255,0.18);\n  border-radius: 6px;\n  padding: 7px 10px;\n  min-width: 180px;\n  font-size: 11.5px;\n  line-height: 1.35;\n  box-shadow: 0 4px 14px rgba(0,0,0,0.35);\n}\n.mann .mann-key {\n  font-size: 9.5px;\n  letter-spacing: 0.1em;\n  color: rgba(125,249,255,0.75);\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  margin-bottom: 3px;\n}\n.mann .mann-val {\n  color: var(--fg-1);\n  font-size: 12px;\n}\n.mann .mann-rate { color: #7df9ff; }\n.mann .mann-meta { color: var(--fg-3); font-size: 11px; }\n.mann .mann-tag {\n  display: inline-block;\n  margin-left: 6px;\n  font-size: 9.5px;\n  letter-spacing: 0.06em;\n  padding: 2px 6px;\n  border-radius: 3px;\n  background: rgba(245,158,11,0.12);\n  border: 1px solid rgba(245,158,11,0.3);\n}\n.mann.warn {\n  border-color: rgba(245,158,11,0.45);\n  background: rgba(40, 22, 8, 0.85);\n  box-shadow: 0 0 0 1px rgba(245,158,11,0.15), 0 6px 18px rgba(0,0,0,0.45);\n}\n.mann.warn .mann-key { color: #f59e0b; }\n.mann.ok    { border-color: rgba(52,211,153,0.35); }\n.mann.ok    .mann-key { color: #34d399; }\n.mann .amber { color: #f59e0b; }\n\n.mann-pulse {\n  width: 7px; height: 7px; border-radius: 50%;\n  background: #f59e0b;\n  box-shadow: 0 0 0 0 rgba(245,158,11,0.6);\n  animation: mann-pulse 1.6s ease-out infinite;\n}\n@keyframes mann-pulse {\n  0%   { box-shadow: 0 0 0 0 rgba(245,158,11,0.6); }\n  100% { box-shadow: 0 0 0 8px rgba(245,158,11,0); }\n}\n\n/* anchor positions over the canvas */\n.mann[data-anchor=\"intake\"]  { top: 22px;   left: 24px; }\n.mann[data-anchor=\"rollers\"] { top: 22px;   left: 50%; transform: translateX(-50%); }\n.mann[data-anchor=\"sifter\"]  { top: 22px;   right: 24px; }\n.mann[data-anchor=\"flour\"]   { bottom: 110px; right: 24px; }\n.mann[data-anchor=\"bran\"]    { bottom: 110px; left: 24px; }\n\n/* ---- Material balance ribbon at bottom of stage ---- */\n.mill-balance {\n  position: absolute;\n  left: 16px;\n  right: 16px;\n  bottom: 16px;\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 10px 14px;\n  background: rgba(8, 12, 20, 0.85);\n  backdrop-filter: blur(10px);\n  -webkit-backdrop-filter: blur(10px);\n  border: 1px solid var(--border);\n  border-radius: 8px;\n  box-shadow: 0 6px 20px rgba(0,0,0,0.4);\n}\n.mbal-cell {\n  display: flex; flex-direction: column; gap: 2px;\n  min-width: 0;\n}\n.mbal-cell .mbal-key {\n  font-size: 9.5px;\n  letter-spacing: 0.1em;\n  color: var(--fg-4);\n}\n.mbal-cell .mbal-val {\n  font-size: 14px;\n  color: var(--fg-1);\n  font-weight: 500;\n}\n.mbal-cell .mbu {\n  font-size: 10px;\n  color: var(--fg-3);\n  margin-left: 3px;\n  font-weight: 400;\n}\n.mbal-cell.flour .mbal-val   { color: #7df9ff; }\n.mbal-cell.bran  .mbal-val   { color: #f59e0b; }\n.mbal-cell.loss  .mbal-val   { color: var(--fg-3); }\n.mbal-cell.extract           { margin-left: auto; text-align: right; }\n.mbal-cell.extract .mbal-val.amber { color: #f59e0b; }\n.mbal-cell.extract .mbal-target {\n  font-size: 9.5px; color: var(--fg-4); letter-spacing: 0.06em;\n}\n.mbal-eq, .mbal-plus {\n  font-size: 14px; color: var(--fg-4); font-weight: 500;\n}\n.mbal-spacer { flex: 1; }\n\n/* ---- CAD corner ticks ---- */\n.mill-tick {\n  position: absolute;\n  width: 12px; height: 12px;\n  border: 1px solid rgba(125,249,255,0.35);\n  pointer-events

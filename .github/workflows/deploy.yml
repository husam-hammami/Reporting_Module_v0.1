name: Deploy Reporting Module

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    defaults:
      run:
        shell: powershell
        working-directory: D:/Reporting_hercules/Reporting_Module_v0.1

    steps:
      - name: Pull latest code
        run: git pull origin main

      - name: Install dependencies
        run: |
          & backend\venv\Scripts\pip.exe install -r backend\requirements.txt

      - name: Run DB migrations
        run: |
          & backend\venv\Scripts\python.exe backend\tools\setup\setup_local_db.py --no-seed

      - name: Restart backend
        run: |
          Get-Process -Name python -ErrorAction SilentlyContinue | Stop-Process -Force
          Start-Sleep -Seconds 2
          Start-Process -FilePath "backend\venv\Scripts\python.exe" -ArgumentList "app.py" -WorkingDirectory "backend" -WindowStyle Hidden

      - name: Verify backend is running
        run: |
          Start-Sleep -Seconds 5
          try {
            $r = Invoke-WebRequest -Uri http://localhost:5001/api/settings/system-status -UseBasicParsing -TimeoutSec 10
            Write-Host "Backend is running (status: $($r.StatusCode))"
          } catch {
            Write-Host "WARNING: Backend health check failed: $_"
          }

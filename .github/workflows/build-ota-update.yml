name: Build OTA Update

on:
  push:
    branches: [main, Salalah_Mill_B]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract branch name and generate version
        shell: bash
        id: version
        run: |
          BRANCH="${GITHUB_REF##refs/heads/}"
          BRANCH_SLUG=$(echo "$BRANCH" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.${COUNT}"
          TAG="${BRANCH_SLUG}-v${VERSION}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "branch_slug=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Generated: branch=${BRANCH} tag=${TAG}"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Build frontend
        shell: bash
        run: |
          cd Frontend
          cp .env.launcher .env.production.local
          npm install
          npm run build

      - name: Copy frontend into backend
        shell: bash
        run: |
          rm -rf backend/frontend/dist
          mkdir -p backend/frontend
          cp -r Frontend/dist backend/frontend/dist

      - name: Write version and branch info
        shell: bash
        run: |
          echo "${{ steps.version.outputs.version }}" > backend/version.txt
          echo "${{ steps.version.outputs.branch }}" > backend/release_branch.txt

      - name: Install Python dependencies
        shell: bash
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe with PyInstaller
        shell: bash
        run: |
          cd backend
          python -m PyInstaller hercules.spec --noconfirm

      - name: Create release zip from frozen exe
        shell: bash
        run: |
          cd backend/dist
          7z a -r ../../hercules-update-${{ steps.version.outputs.tag }}.zip hercules-backend/

      - name: Compute SHA-256
        shell: bash
        id: hash
        run: |
          SHA=$(sha256sum hercules-update-${{ steps.version.outputs.tag }}.zip | cut -d' ' -f1)
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "${{ steps.version.outputs.branch }} — v${{ steps.version.outputs.version }}"
          body: |
            OTA update from **${{ steps.version.outputs.branch }}** branch.
            Version: `${{ steps.version.outputs.version }}`
            SHA-256: `${{ steps.hash.outputs.sha256 }}`
          files: hercules-update-${{ steps.version.outputs.tag }}.zip

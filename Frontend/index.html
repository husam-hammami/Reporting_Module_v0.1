<!doctype html>
<html lang="en" dir="ltr" class="dark dark-style">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+Arabic:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    <title>HERCULES-V2</title>
    <link rel="stylesheet" href="/preloader.css">
  </head>
  <body>
    <div id="hercules-preloader">
      <img src="/herculeslogo.png" alt="Hercules" />
      <div class="loader-bar"><div class="loader-bar-fill"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function() {
        var el = document.getElementById('hercules-preloader');
        if (!el) return;
        var observer = new MutationObserver(function() {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            el.classList.add('fade-out');
            setTimeout(function() { el.remove(); }, 500);
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>

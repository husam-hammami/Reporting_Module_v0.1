<!doctype html>
<html lang="en" class="dark dark-style">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <title>HERCULES-V2</title>
  </head>
  <body>
    <video id="bg-video" autoplay loop muted playsinline preload="auto">
      <source src="/bg-video.mp4" type="video/mp4" />
    </video>
    <div id="bg-video-overlay"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function() {
        var v = document.getElementById('bg-video');
        if (!v) return;
        v.playbackRate = 0.75;
        function tp() { v.play().catch(function(){}); }
        tp();
        v.addEventListener('canplay', tp);
        document.addEventListener('click', tp, { once: true });
        document.addEventListener('touchstart', tp, { once: true });
      })();
    </script>
  </body>
</html>
